<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USDT</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<head>
<script>
fetch('head.html')
  .then(res => res.text())
  .then(data => {
    document.head.insertAdjacentHTML('afterbegin', data);
  });
</script>
<style>
body {
    margin: 0;
    background: #ffffff;
    color: black;
    font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    align-items: center;
    font-weight: bold;
}

/* PRICE */
.price {
    text-align: center;
}

.price h1 {
    font-size: 36px;
    font-weight: 700;
}

.green { color: #22c55e; }

/* CHART */
.chart-container {
    height: 200px;
}

/* BUY BOX */
.buy-box {
    background: #f1f5f9;
    margin: 15px;
    padding: 15px;
    border-radius: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.buy-btn {
    background: blue;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 20px;
}

/* TABS */
.tabs {
    display: flex;
    justify-content: space-around;
    font-weight: bold;
}

/* BALANCE */
.balance {
    padding: 15px;
}

/* CARD */
.card {
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#f1f5f9;
    padding:12px;
    border-radius:12px;
    margin-top:10px;
}

/* ADDRESS */
.address {
    margin:15px;
    padding:12px;
    background:#f8fafc;
    border-radius:10px;
    font-size:12px;
    word-break: break-all;
    cursor:pointer;
}

/* ACTIONS */
.actions {
    display: flex;
    justify-content: space-around;
    position: fixed;
    bottom: 10px;
    width: 100%;
}

.actions button {
    background: #f1f5f9;
    border: none;
    padding: 10px;
    border-radius: 10px;
}

.actions button.primary {
    background: blue;
    color: white;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div onclick="goBack()">←</div>
    <div>USDT</div>
    <div>⭐</div>
</div>

<!-- PRICE -->
<div class="price">
    <h1>$1.00</h1>
    <div class="green">+0.01%</div>
</div>

<!-- CHART -->
<div class="chart-container">
    <canvas id="chart"></canvas>
</div>

<!-- BUY -->
<div class="buy-box">
    <div style="font-weight:700; font-size:20px;">3 185 CZK</div>
    <button class="buy-btn">Koupit</button>
</div>

<!-- TABS -->
<div class="tabs">
    <div>V držení</div>
    <div>Historie</div>
    <div>Info</div>
</div>

<!-- BALANCE -->
<div class="balance">
    <div>Můj zůstatek</div>

    <div class="card">

        <!-- LEFT -->
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="usdt.png" style="width:32px;">
            <div>
                <div style="font-weight:bold;">Tether</div>
                <div style="color:gray; font-weight:600;">200000000 USDT</div>
            </div>
        </div>

        <!-- RIGHT -->
        <div style="text-align:right;">
            <div style="font-weight:700; font-size:18px;">$200000000</div>
            <div style="color:#22c55e; font-weight:600;">+$0.01</div>
        </div>

    </div>
</div>

<!-- ADDRESS -->
<div class="address" onclick="copyAddress()">
    TWmi8rRf8qEfmqE9EcC12dgUzbUjrnEtg5
</div>

<!-- ACTIONS -->
<div class="actions">
    <button>↗</button>
    <button>↓</button>
    <button>⇄</button>
    <button class="primary">🛒</button>
    <button>🏦</button>
</div>

<script>

// BACK
function goBack() {
    window.location.href = "index1.html";
}

// COPY ADDRESS
function copyAddress() {
    navigator.clipboard.writeText("TWmi8rRf8qEfmqE9EcC12dgUzbUjrnEtg5");
    alert("Adresa zkopírována");
}

// STABLE GRAPH
const data = [1,1.01,1,1.02,1,1];

const ctx = document.getElementById("chart");

new Chart(ctx, {
    type: "line",
    data: {
        labels: data.map((_, i) => i),
        datasets: [{
            data: data,
            borderColor: "#22c55e",
            tension: 0.4,
            pointRadius: 0,
            borderWidth: 3
        }]
    },
    options: {
        plugins: { legend: { display: false } },
        scales: { x: { display: false }, y: { display: false } }
    }
});

</script>

</body>
</html>
