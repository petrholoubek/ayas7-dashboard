<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<title>USDt.z – Add Token</title>

<style>
body{
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background:#0b0f1a;
color:white;
margin:0;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.container{
background:#111827;
padding:40px;
border-radius:14px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
width:340px;
}

.logo{
width:90px;
margin-bottom:15px;
}

h1{
margin:10px 0;
font-size:26px;
}

p{
color:#cbd5e1;
font-size:14px;
margin-bottom:25px;
}

button{
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background:#f0b90b;
border:none;
padding:14px 26px;
border-radius:8px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#ffd84d;
}

.info{
margin-top:18px;
font-size:13px;
color:#9ca3af;
word-break:break-all;
}

.link{
margin-top:10px;
font-size:13px;
}

.link a{
color:#f0b90b;
text-decoration:none;
}
</style>

</head>

<body>

<div class="container">

<img class="logo" src="https://www.ayas7.com/token/usdtz.png">

<h1>USDt.z</h1>

<p>BEP-20 token na BNB Smart Chain</p>

<button onclick="addToken()">Add Token to Wallet</button>

<div class="info">
0xFFD225737d0607bAaf330C0550A5D6BbB0Ab9717
</div>

<div class="link">
<a href="https://bscscan.com/token/0xFFD225737d0607bAaf330C0550A5D6BbB0Ab9717" target="_blank">
View on BscScan
</a>
</div>

</div>

<script>

const tokenAddress = "0xFFD225737d0607bAaf330C0550A5D6BbB0Ab9717";
const tokenSymbol = "USDt.z";
const tokenDecimals = 18;
const tokenImage = "https://www.ayas7.com/token/usdtz.png";


async function switchNetwork(){

if(!window.ethereum){
alert("Wallet nebyla nalezena. Otevřete stránku ve wallet browseru.");
return;
}

try{

await window.ethereum.request({
method:"wallet_switchEthereumChain",
params:[{ chainId:"0x38" }]
});

}catch(error){

if(error.code === 4902){

await window.ethereum.request({
method:"wallet_addEthereumChain",
params:[{
chainId:"0x38",
chainName:"BNB Smart Chain",
rpcUrls:["https://bsc-dataseed.binance.org/"],
nativeCurrency:{
name:"BNB",
symbol:"BNB",
decimals:18
},
blockExplorerUrls:["https://bscscan.com"]
}]
});

}

}

}



async function addToken(){

if(!window.ethereum){
alert("Wallet nebyla nalezena.");
return;
}

try{

await switchNetwork();

const added = await window.ethereum.request({
method:"wallet_watchAsset",
params:{
type:"ERC20",
options:{
address:tokenAddress,
symbol:tokenSymbol,
decimals:tokenDecimals,
image:tokenImage
}
}
});

if(added){
alert("Token byl přidán do peněženky.");
}else{
console.log("Uživatel operaci zrušil");
}

}catch(err){

console.error(err);
alert("Došlo k chybě při přidávání tokenu.");

}

}

</script>

</body>
</html>
