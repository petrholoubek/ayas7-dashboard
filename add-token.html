<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Přidat USDt.z do MetaMask</title>
</head>

<body style="font-family:Arial;text-align:center;margin-top:100px;">

<h2>Přidat USDt.z do MetaMask</h2>

<button onclick="addToken()" style="padding:15px 30px;font-size:18px;">
Přidat USDt.z do peněženky
</button>

<script>

const tokenAddress = '0xFFD225737d0607bAaf330C0550A5D6BbB0Ab9717';
const tokenSymbol = 'USDt.z';
const tokenDecimals = 18;
const tokenImage = 'https://www.ayas7.com/logo/usdtz.png';

async function addToken() {

if (!window.ethereum) {
alert("MetaMask není nainstalovaný");
return;
}

try {

const wasAdded = await window.ethereum.request({
method: 'wallet_watchAsset',
params: {
type: 'ERC20',
options: {
address: tokenAddress,
symbol: tokenSymbol,
decimals: tokenDecimals,
image: tokenImage,
},
},
});

if (wasAdded) {
alert("Token byl přidán do MetaMask");
}

} catch (error) {
console.log(error);
}

}

</script>

</body>
</html>
