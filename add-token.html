<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<title>USDt.z – Token</title>

<style>

body{
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background:#071124;
margin:0;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
color:white;
}

.card{
background:#0f1b33;
padding:40px;
border-radius:16px;
text-align:center;
width:360px;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.logo{
width:90px;
margin-bottom:15px;
}

h1{
margin:10px 0;
font-size:28px;
}

p{
color:#b8c1d9;
margin-bottom:25px;
}

button{
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background:#f0b90b;
border:none;
padding:14px 26px;
border-radius:10px;
font-size:16px;
font-weight:600;
cursor:pointer;
margin:6px;
}

button:hover{
background:#ffd84d;
}

.secondary{
background:#1e2a47;
color:white;
}

.secondary:hover{
background:#2d3a5e;
}

.address{
font-size:13px;
color:#9fb0d6;
margin-top:10px;
word-break:break-all;
}

.link{
margin-top:12px;
font-size:14px;
}

.link a{
color:#f0b90b;
text-decoration:none;
}

</style>

</head>

<body>

<div class="card">

<img class="logo" src="https://www.ayas7.com/token/usdtz.png">

<h1>USDt.z</h1>

<p>BEP-20 token na BNB Smart Chain</p>

<button onclick="addToken()">Add Token to Wallet</button>

<br>

<button class="secondary" onclick="copyAddress()">Copy Contract</button>

<a href="https://pancakeswap.finance/swap?outputCurrency=0xFFD225737d0607bAaf330C0550A5D6BbB0Ab9717" target="_blank">
<button class="secondary">Buy on PancakeSwap</button>
</a>

<div class="address">
0xFFD225737d0607bAaf330C0550A5D6BbB0Ab9717
</div>

<div class="link">
<a href="https://bscscan.com/token/0xFFD225737d0607bAaf330C0550A5D6BbB0Ab9717" target="_blank">
View on BscScan
</a>
</div>

</div>

<script>

const tokenAddress="0xFFD225737d0607bAaf330C0550A5D6BbB0Ab9717";
const tokenSymbol="USDt.z";
const tokenDecimals=18;
const tokenImage="https://www.ayas7.com/token/usdtz.png";

/* detekce mobilu */
function isMobile(){
return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

async function switchNetwork(){

try{

await window.ethereum.request({
method:"wallet_switchEthereumChain",
params:[{chainId:"0x38"}]
});

}catch(error){

if(error.code===4902){

await window.ethereum.request({
method:"wallet_addEthereumChain",
params:[{
chainId:"0x38",
chainName:"BNB Smart Chain",
rpcUrls:["https://bsc-dataseed.binance.org/"],
nativeCurrency:{
name:"BNB",
symbol:"BNB",
decimals:18
},
blockExplorerUrls:["https://bscscan.com"]
}]
});

}

}

}

async function addToken(){

/* mobil bez wallet provideru */
if(!window.ethereum && isMobile()){

const url=encodeURIComponent(window.location.href);

window.location.href=
"https://metamask.app.link/dapp/"+window.location.host;

return;

}

/* desktop */
if(!window.ethereum){

alert("Otevřete stránku v MetaMask nebo Trust Wallet.");

return;

}

try{

await window.ethereum.request({
method:"eth_requestAccounts"
});

await switchNetwork();

const wasAdded=await window.ethereum.request({

method:"wallet_watchAsset",

params:{
type:"ERC20",
options:{
address:tokenAddress,
symbol:tokenSymbol,
decimals:tokenDecimals,
image:tokenImage
}
}

});

if(wasAdded){
alert("Token byl přidán do peněženky.");
}

}catch(err){

console.error(err);

alert("Nepodařilo se přidat token.");

}

}

function copyAddress(){

navigator.clipboard.writeText(tokenAddress);

alert("Contract address copied");

}

</script>

</body>
</html>
